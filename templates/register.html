{% extends "base.html" %}
{% block title %}注册 - 智学通{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                <h2>创建账号 🚀</h2>
                <p class="text-muted">加入智学通，开启智能学习之旅</p>
            </div>

            <form method="POST" action="{{ url_for('register') }}" class="auth-form" onsubmit="return validateRegister()">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person"></i> 用户名 <span class="text-danger">*</span>
                    </label>
                    <input type="text" name="username" class="form-control form-control-lg"
                           placeholder="至少3个字符" required minlength="3" autocomplete="username">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-envelope"></i> 邮箱 <small class="text-muted">(选填)</small>
                    </label>
                    <input type="email" name="email" class="form-control form-control-lg"
                           placeholder="example@mail.com" autocomplete="email">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-lock"></i> 密码 <span class="text-danger">*</span>
                    </label>
                    <input type="password" name="password" class="form-control form-control-lg"
                           placeholder="至少6个字符" required minlength="6"
                           id="regPassword" autocomplete="new-password">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-lock-fill"></i> 确认密码 <span class="text-danger">*</span>
                    </label>
                    <input type="password" name="password2" class="form-control form-control-lg"
                           placeholder="请再次输入密码" required minlength="6"
                           id="regPassword2" autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 auth-btn">
                    <i class="bi bi-person-plus me-2"></i>注册
                </button>
            </form>

            <div class="auth-footer">
                <p>已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function validateRegister() {
    const pwd = document.getElementById('regPassword').value;
    const pwd2 = document.getElementById('regPassword2').value;
    if (pwd !== pwd2) {
        alert('两次密码输入不一致！');
        return false;
    }
    return true;
}
</script>
{% endblock %}

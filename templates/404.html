{% extends "base.html" %}
{% block title %}页面未找到 - 智学通{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-container text-center">
        <div class="error-code">404</div>
        <h2>页面未找到 😥</h2>
        <p class="text-muted">你访问的页面可能已被移动或不存在</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg mt-3">
            <i class="bi bi-house me-2"></i>返回首页
        </a>
    </div>
</div>
{% endblock %}

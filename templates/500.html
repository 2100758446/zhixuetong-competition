{% extends "base.html" %}
{% block title %}服务器错误 - 智学通{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-container text-center">
        <div class="error-code">500</div>
        <h2>服务器出了点问题 🔧</h2>
        <p class="text-muted">请稍后再试，或联系技术支持</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg mt-3">
            <i class="bi bi-arrow-repeat me-2"></i>刷新页面
        </a>
    </div>
</div>
{% endblock %}
